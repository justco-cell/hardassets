name: Daily Blog Post

# Schedule: 13:00 UTC daily = 9:00 AM US Eastern (EDT; shifts to 8:00 AM during EST).
# Also runs on-demand via the Actions UI "Run workflow" button.
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch: {}

permissions:
  # Needed so the workflow can push the generated post back to the repo.
  contents: write
  # Required by anthropics/claude-code-action@v1 for OIDC token exchange.
  id-token: write

concurrency:
  # Never run two daily-post jobs at once. A later scheduled run supersedes a stuck earlier one.
  group: daily-blog
  cancel-in-progress: false

jobs:
  generate:
    name: Research, write, and commit today's blog post
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Job-level env propagates to every step, including subprocesses launched
    # by the composite Claude Code action (which doesn't redeclare ANTHROPIC_MODEL
    # in its own env block, so it inherits this one).
    env:
      ANTHROPIC_MODEL: claude-haiku-4-5-20251001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GITHUB_TOKEN is persisted in the clone so `git push` authenticates
          # using the workflow's own token — no PAT, no HTTPS username/password.
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Load blog prompt into the workflow environment
        # The prompt is multi-kilobyte — load it into GITHUB_ENV with a heredoc
        # so the next step can pass it to claude-code-action as a single string.
        run: |
          {
            echo 'BLOG_PROMPT<<PROMPT_EOF'
            cat .github/scripts/daily-blog-prompt.md
            echo
            echo 'PROMPT_EOF'
          } >> "$GITHUB_ENV"

      - name: Debug model config
        # Prints the env var the Claude Code CLI should pick up. Lets us
        # verify model pinning before the action runs, from the workflow log.
        run: echo "Model will be → ANTHROPIC_MODEL=$ANTHROPIC_MODEL"

      - name: Run Claude Code to generate today's post
        uses: anthropics/claude-code-action@v1
        env:
          # Redundant with job-level env but belt-and-suspenders: guarantees
          # ANTHROPIC_MODEL is present for the action's own subprocess env,
          # even if a future action version shadows the parent env block.
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ env.BLOG_PROMPT }}
          # `model:` is not a documented input on claude-code-action@v1 —
          # composite actions silently ignore unknown `with:` keys. Left here
          # in case a future version adds direct support.
          model: claude-haiku-4-5-20251001
          # settings.model is the documented path for pinning via this action.
          settings: '{"model": "claude-haiku-4-5-20251001"}'
          # --model inside claude_args is the CLI-native way. Whether it wins
          # over settings.model depends on the CLI's precedence.
          # --allowedTools whitelists tools the agent can use without prompting.
          # --permission-mode acceptEdits auto-approves file edits.
          # --max-turns bounds runaway loops.
          claude_args: >-
            --model claude-haiku-4-5-20251001
            --allowedTools Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch
            --permission-mode acceptEdits
            --max-turns 50

      - name: Configure git identity (HardAssets Bot)
        run: |
          git config user.name "HardAssets Bot"
          git config user.email "bot@hardassets.io"

      - name: Commit and push if Claude Code produced changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "::notice title=No changes::Claude Code ran but produced no file changes. Nothing to commit."
            exit 0
          fi
          git commit -m "blog: daily post - $(date +%Y-%m-%d)"
          # persist-credentials:true from checkout means the GITHUB_TOKEN is
          # already baked into the origin remote. Plain `git push` works.
          git push
          echo "::notice title=Committed::Daily post committed and pushed."

      - name: Summarize committed changes
        if: always()
        run: |
          echo "=============================================="
          echo "HEAD commit:"
          git log -1 --format='%h %s%n  author: %an <%ae>%n  date:   %ad' --date=iso || true
          echo "----------------------------------------------"
          echo "Files in the last commit:"
          git diff-tree --no-commit-id --name-status -r HEAD || true
          echo "=============================================="
