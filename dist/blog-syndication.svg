  <line x1="820" y1="294" x2="820" y2="340" stroke="#60A5FA" stroke-width="2" opacity="0.5"/>
  <polygon points="812,338 820,350 828,338" fill="#60A5FA" opacity="0.5"/>
  <!-- Returns box -->
  <rect x="720" y="350" width="200" height="80" rx="14" fill="#111827" stroke="#34D399" stroke-width="2"/>
  <text x="820" y="382" text-anchor="middle" fill="#34D399" font-family="system-ui" font-size="14" font-weight="700">Cash Flow</text>
  <text x="820" y="408" text-anchor="middle" fill="#34D399" font-family="monospace" font-size="16" font-weight="800">8% Pref Return</text>
  <!-- Key metrics -->
  <rect x="680" y="460" width="130" height="50" rx="8" fill="#111827" stroke="#1E293B"/>
  <text x="745" y="482" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="10" font-weight="600">PROJ. IRR</text>
  <text x="745" y="500" text-anchor="middle" fill="#D4A843" font-family="monospace" font-size="16" font-weight="800">15.2%</text>
  <rect x="830" y="460" width="130" height="50" rx="8" fill="#111827" stroke="#1E293B"/>
  <text x="895" y="482" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="10" font-weight="600">HOLD PERIOD</text>
  <text x="895" y="500" text-anchor="middle" fill="#60A5FA" font-family="monospace" font-size="16" font-weight="800">5 Years</text>
  <!-- Title -->
  <text x="600" y="565" text-anchor="middle" fill="#F1F5F9" font-family="system-ui" font-size="26" font-weight="900">Real Estate Syndications Explained</text>
  <text x="600" y="595" text-anchor="middle" fill="#94A3B8" font-family="system-ui" font-size="14">A Guide for LP Investors — HardAssets.io</text>
