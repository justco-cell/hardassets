    <rect x="230" y="220" width="20" height="20" rx="2" fill="#D4A843" opacity="0.2"/>
    <rect x="140" y="255" width="20" height="20" rx="2" fill="#D4A843" opacity="0.3"/>
    <rect x="170" y="255" width="20" height="20" rx="2" fill="#60A5FA" opacity="0.5"/>
    <rect x="200" y="255" width="20" height="20" rx="2" fill="#D4A843" opacity="0.4"/>
    <rect x="230" y="255" width="20" height="20" rx="2" fill="#60A5FA" opacity="0.3"/>
    <rect x="140" y="290" width="20" height="20" rx="2" fill="#60A5FA" opacity="0.4"/>
