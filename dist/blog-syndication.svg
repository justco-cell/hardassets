  <text x="730" y="278" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">$75K</text>
  <rect x="800" y="230" width="100" height="64" rx="10" fill="#111827" stroke="#60A5FA" stroke-width="2"/>
  <text x="850" y="258" text-anchor="middle" fill="#60A5FA" font-family="system-ui" font-size="12" font-weight="700">LP 2</text>
  <text x="850" y="278" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">$150K</text>
  <rect x="920" y="230" width="100" height="64" rx="10" fill="#111827" stroke="#60A5FA" stroke-width="2"/>
  <text x="970" y="258" text-anchor="middle" fill="#60A5FA" font-family="system-ui" font-size="12" font-weight="700">LP 3</text>
  <text x="970" y="278" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">$100K</text>
