  <rect x="640" y="80" width="500" height="460" rx="20" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="890" y="130" text-anchor="middle" fill="#64748B" font-family="Arial,sans-serif" font-size="22" font-weight="800">PAPER ASSETS</text>
  <g font-family="Arial,sans-serif">
    <rect x="680" y="160" width="400" height="36" rx="6" fill="rgba(248,113,113,0.08)"/>
    <rect x="680" y="160" width="120" height="36" rx="6" fill="#F87171" opacity="0.5"/>
    <text x="695" y="184" fill="#F1F5F9" font-size="14" font-weight="700">S&amp;P 500</text>
    <text x="810" y="184" fill="#F87171" font-size="14" font-weight="700">Volatile</text>
    <rect x="680" y="210" width="400" height="36" rx="6" fill="rgba(248,113,113,0.08)"/>
    <rect x="680" y="210" width="60" height="36" rx="6" fill="#F87171" opacity="0.4"/>
    <text x="695" y="234" fill="#F1F5F9" font-size="14" font-weight="700">Bonds</text>
    <text x="755" y="234" fill="#F87171" font-size="14" font-weight="700">Neg. real return</text>
    <rect x="680" y="260" width="400" height="36" rx="6" fill="rgba(248,113,113,0.08)"/>
    <rect x="680" y="260" width="80" height="36" rx="6" fill="#F87171" opacity="0.4"/>
    <text x="695" y="284" fill="#F1F5F9" font-size="14" font-weight="700">US Dollar</text>
    <text x="775" y="284" fill="#F87171" font-size="14" font-weight="700">-11%</text>
