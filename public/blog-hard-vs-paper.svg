  <text x="890" y="400" text-anchor="middle" fill="#F87171" font-family="Arial,sans-serif" font-size="13" font-weight="600" opacity="0.7">Counterparty dependent</text>
  <text x="890" y="420" text-anchor="middle" fill="#F87171" font-family="Arial,sans-serif" font-size="13" font-weight="600" opacity="0.7">Eroded by inflation</text>
  <text x="890" y="440" text-anchor="middle" fill="#F87171" font-family="Arial,sans-serif" font-size="13" font-weight="600" opacity="0.7">Digital promises</text>
  <!-- VS badge -->
  <circle cx="600" cy="310" r="36" fill="#1E293B" stroke="#D4A843" stroke-width="2"/>
  <text x="600" y="317" text-anchor="middle" fill="#D4A843" font-family="Arial,sans-serif" font-size="18" font-weight="900">VS</text>
  <!-- Footer -->
  <text x="600" y="580" text-anchor="middle" fill="#F1F5F9" font-family="Arial,sans-serif" font-size="18" font-weight="800">Hard Assets vs Paper Assets: The 2026 Scorecard</text>
  <text x="600" y="605" text-anchor="middle" fill="#64748B" font-family="Arial,sans-serif" font-size="13">HardAssets.io</text>
