<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F1729"/><stop offset="100%" stop-color="#0B0F1A"/>
    </linearGradient>
    <linearGradient id="gld" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECC94B"/><stop offset="100%" stop-color="#B8912E"/>
    </linearGradient>
    <radialGradient id="gw" cx="50%" cy="45%"><stop offset="0%" stop-color="#D4A843" stop-opacity="0.08"/><stop offset="70%" stop-color="#0B0F1A" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#gw)"/>

  <!-- Scattered asset icons as abstract background -->
  <!-- Gold bars -->
  <g transform="translate(80,120) rotate(-8)">
    <rect width="180" height="80" rx="8" fill="#D4A843" opacity="0.12"/>
    <rect x="10" y="10" width="160" height="60" rx="6" fill="#D4A843" opacity="0.08"/>
  </g>
  <g transform="translate(950,80) rotate(5)">
    <rect width="140" height="60" rx="6" fill="#D4A843" opacity="0.1"/>
    <rect x="8" y="8" width="124" height="44" rx="4" fill="#D4A843" opacity="0.06"/>
  </g>

  <!-- Building silhouette -->
  <g opacity="0.1">
    <rect x="160" y="340" width="80" height="200" rx="2" fill="#60A5FA"/>
    <rect x="250" y="380" width="60" height="160" rx="2" fill="#60A5FA"/>
    <rect x="320" y="300" width="90" height="240" rx="2" fill="#60A5FA"/>
  </g>

  <!-- Crypto circle -->
  <circle cx="1020" cy="420" r="100" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.12"/>
  <circle cx="1020" cy="420" r="70" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.08"/>

  <!-- Central content area -->
  <rect x="300" y="140" width="600" height="350" rx="24" fill="#111827" fill-opacity="0.7" stroke="#1E293B" stroke-width="1"/>

  <!-- 6 asset type cards inside -->
  <g transform="translate(340,180)">
    <!-- Row 1 -->
    <rect width="160" height="64" rx="12" fill="#D4A843" fill-opacity="0.12" stroke="#D4A843" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="30" cy="32" r="16" fill="#D4A843" fill-opacity="0.2"/><circle cx="30" cy="32" r="8" fill="#D4A843"/>
    <rect x="56" y="18" width="80" height="8" rx="4" fill="#D4A843" opacity="0.6"/>
    <rect x="56" y="34" width="56" height="6" rx="3" fill="#D4A843" opacity="0.3"/>

    <g transform="translate(180,0)">
      <rect width="160" height="64" rx="12" fill="#60A5FA" fill-opacity="0.1" stroke="#60A5FA" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="30" cy="32" r="16" fill="#60A5FA" fill-opacity="0.2"/><circle cx="30" cy="32" r="8" fill="#60A5FA"/>
      <rect x="56" y="18" width="80" height="8" rx="4" fill="#60A5FA" opacity="0.6"/>
      <rect x="56" y="34" width="56" height="6" rx="3" fill="#60A5FA" opacity="0.3"/>
    </g>

    <g transform="translate(360,0)">
      <rect width="160" height="64" rx="12" fill="#A78BFA" fill-opacity="0.1" stroke="#A78BFA" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="30" cy="32" r="16" fill="#A78BFA" fill-opacity="0.2"/><circle cx="30" cy="32" r="8" fill="#A78BFA"/>
      <rect x="56" y="18" width="80" height="8" rx="4" fill="#A78BFA" opacity="0.6"/>
      <rect x="56" y="34" width="56" height="6" rx="3" fill="#A78BFA" opacity="0.3"/>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0,84)">
      <rect width="160" height="64" rx="12" fill="#34D399" fill-opacity="0.1" stroke="#34D399" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="30" cy="32" r="16" fill="#34D399" fill-opacity="0.2"/><circle cx="30" cy="32" r="8" fill="#34D399"/>
      <rect x="56" y="18" width="80" height="8" rx="4" fill="#34D399" opacity="0.6"/>
      <rect x="56" y="34" width="56" height="6" rx="3" fill="#34D399" opacity="0.3"/>
    </g>

    <g transform="translate(180,84)">
      <rect width="160" height="64" rx="12" fill="#22D3EE" fill-opacity="0.1" stroke="#22D3EE" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="30" cy="32" r="16" fill="#22D3EE" fill-opacity="0.2"/><circle cx="30" cy="32" r="8" fill="#22D3EE"/>
      <rect x="56" y="18" width="80" height="8" rx="4" fill="#22D3EE" opacity="0.6"/>
      <rect x="56" y="34" width="56" height="6" rx="3" fill="#22D3EE" opacity="0.3"/>
    </g>

    <g transform="translate(360,84)">
      <rect width="160" height="64" rx="12" fill="#FB923C" fill-opacity="0.1" stroke="#FB923C" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="30" cy="32" r="16" fill="#FB923C" fill-opacity="0.2"/><circle cx="30" cy="32" r="8" fill="#FB923C"/>
      <rect x="56" y="18" width="80" height="8" rx="4" fill="#FB923C" opacity="0.6"/>
      <rect x="56" y="34" width="56" height="6" rx="3" fill="#FB923C" opacity="0.3"/>
    </g>
  </g>

  <!-- Pie chart -->
  <g transform="translate(600,410)">
    <circle r="48" fill="none" stroke="#1E293B" stroke-width="14"/>
    <circle r="48" fill="none" stroke="#D4A843" stroke-width="14" stroke-dasharray="90 212" stroke-dashoffset="0" stroke-linecap="round"/>
    <circle r="48" fill="none" stroke="#60A5FA" stroke-width="14" stroke-dasharray="60 242" stroke-dashoffset="-90" stroke-linecap="round"/>
    <circle r="48" fill="none" stroke="#A78BFA" stroke-width="14" stroke-dasharray="40 262" stroke-dashoffset="-150" stroke-linecap="round"/>
    <circle r="48" fill="none" stroke="#34D399" stroke-width="14" stroke-dasharray="30 272" stroke-dashoffset="-190" stroke-linecap="round"/>
  </g>

  <!-- Logo -->
  <rect x="548" y="560" width="32" height="32" rx="9" fill="url(#gld)"/>
  <text x="557" y="583" fill="#0B0F1A" font-family="Arial,sans-serif" font-size="18" font-weight="900">H</text>
  <text x="590" y="583" fill="#F1F5F9" font-family="Arial,sans-serif" font-size="15" font-weight="800">HardAssets.io</text>
</svg>
