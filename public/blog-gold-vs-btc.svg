<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="gbbg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F1729"/><stop offset="100%" stop-color="#0B0F1A"/>
    </linearGradient>
    <linearGradient id="gld3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECC94B"/><stop offset="100%" stop-color="#B8912E"/>
    </linearGradient>
    <radialGradient id="gglow" cx="30%" cy="50%"><stop offset="0%" stop-color="#D4A843" stop-opacity="0.06"/><stop offset="60%" stop-color="#0B0F1A" stop-opacity="0"/></radialGradient>
    <radialGradient id="bglow" cx="70%" cy="50%"><stop offset="0%" stop-color="#FB923C" stop-opacity="0.05"/><stop offset="60%" stop-color="#0B0F1A" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#gbbg)"/>
  <rect width="1200" height="630" fill="url(#gglow)"/>
  <rect width="1200" height="630" fill="url(#bglow)"/>
  <!-- Gold coin -->
  <g transform="translate(300,260)">
    <circle r="130" fill="#111827" stroke="#D4A843" stroke-width="3"/>
    <circle r="110" fill="none" stroke="#D4A843" stroke-width="0.5" opacity="0.2" stroke-dasharray="6 6"/>
    <circle r="90" fill="#D4A843" opacity="0.06"/>
    <text y="-10" text-anchor="middle" fill="#D4A843" font-family="Georgia,serif" font-size="60" font-weight="700">Au</text>
    <text y="30" text-anchor="middle" fill="#D4A843" font-family="Arial,sans-serif" font-size="14" font-weight="600" opacity="0.7">GOLD</text>
    <text y="60" text-anchor="middle" fill="#D4A843" font-family="'Courier New',monospace" font-size="20" font-weight="800">$5,595</text>
    <text y="80" text-anchor="middle" fill="#34D399" font-family="Arial,sans-serif" font-size="13" font-weight="700">+65% in 2025</text>
  </g>
  <!-- VS -->
  <g transform="translate(600,260)">
    <circle r="32" fill="#1E293B" stroke="rgba(148,163,184,0.2)" stroke-width="2"/>
    <text y="8" text-anchor="middle" fill="#94A3B8" font-family="Arial,sans-serif" font-size="18" font-weight="900">VS</text>
  </g>
  <!-- Bitcoin -->
  <g transform="translate(900,260)">
    <circle r="130" fill="#111827" stroke="#FB923C" stroke-width="3"/>
    <circle r="110" fill="none" stroke="#FB923C" stroke-width="0.5" opacity="0.2" stroke-dasharray="6 6"/>
    <circle r="90" fill="#FB923C" opacity="0.04"/>
    <text y="-10" text-anchor="middle" fill="#FB923C" font-family="Arial,sans-serif" font-size="60" font-weight="900">₿</text>
    <text y="30" text-anchor="middle" fill="#FB923C" font-family="Arial,sans-serif" font-size="14" font-weight="600" opacity="0.7">BITCOIN</text>
    <text y="60" text-anchor="middle" fill="#FB923C" font-family="'Courier New',monospace" font-size="20" font-weight="800">$88,000</text>
    <text y="80" text-anchor="middle" fill="#94A3B8" font-family="Arial,sans-serif" font-size="13" font-weight="700">Consolidating</text>
  </g>
  <!-- Allocation bars at bottom -->
  <g transform="translate(200,460)" font-family="Arial,sans-serif">
    <text x="0" y="-8" fill="#94A3B8" font-size="11" font-weight="600">CONSERVATIVE</text>
    <rect width="640" height="16" rx="8" fill="#1E293B"/>
    <rect width="512" height="16" rx="8" fill="#D4A843" opacity="0.8"/><text x="250" y="12" fill="#0B0F1A" font-size="9" font-weight="700" text-anchor="middle">80% Gold</text>
    <rect x="512" width="128" height="16" rx="0 8 8 0" fill="#FB923C" opacity="0.8"/><text x="576" y="12" fill="#0B0F1A" font-size="9" font-weight="700" text-anchor="middle">20% BTC</text>
    <text x="0" y="38" fill="#94A3B8" font-size="11" font-weight="600">BALANCED</text>
    <rect y="46" width="640" height="16" rx="8" fill="#1E293B"/>
    <rect y="46" width="384" height="16" rx="8" fill="#D4A843" opacity="0.8"/><text x="192" y="58" fill="#0B0F1A" font-size="9" font-weight="700" text-anchor="middle">60% Gold</text>
    <rect x="384" y="46" width="256" height="16" rx="0 8 8 0" fill="#FB923C" opacity="0.8"/><text x="512" y="58" fill="#0B0F1A" font-size="9" font-weight="700" text-anchor="middle">40% BTC</text>
    <text x="0" y="84" fill="#94A3B8" font-size="11" font-weight="600">AGGRESSIVE</text>
    <rect y="92" width="640" height="16" rx="8" fill="#1E293B"/>
    <rect y="92" width="256" height="16" rx="8" fill="#D4A843" opacity="0.8"/><text x="128" y="104" fill="#0B0F1A" font-size="9" font-weight="700" text-anchor="middle">40% Gold</text>
    <rect x="256" y="92" width="384" height="16" rx="0 8 8 0" fill="#FB923C" opacity="0.8"/><text x="448" y="104" fill="#0B0F1A" font-size="9" font-weight="700" text-anchor="middle">60% BTC</text>
  </g>
  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="#F1F5F9" font-family="Arial,sans-serif" font-size="24" font-weight="800">Gold vs Bitcoin in 2026</text>
  <text x="600" y="90" text-anchor="middle" fill="#94A3B8" font-family="Arial,sans-serif" font-size="14">Why Smart Investors Track Both — HardAssets.io</text>
</svg>
