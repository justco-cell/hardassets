<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A843"/>
      <stop offset="100%" style="stop-color:#B8912E"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#A8A8A8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#0B0F1A"/>

  <!-- Title -->
  <text x="300" y="32" font-size="22" font-weight="bold" fill="#F1F5F9" text-anchor="middle">Spot Price vs Premium</text>

  <!-- ========== GOLD ========== -->
  <text x="30" y="68" font-size="15" font-weight="700" fill="#D4A843">Gold 1oz Coin</text>

  <!-- Gold Spot row -->
  <text x="30" y="99" font-size="13" fill="#A8B2C7">Spot Price</text>
  <rect x="150" y="84" width="300" height="22" fill="url(#goldGrad)" rx="3"/>
  <text x="465" y="101" font-size="14" font-weight="700" fill="#F1F5F9">$2,450</text>

  <!-- Gold Premium row (bar 25px wide = ~5% visually, roughly proportional to 4.9%) -->
  <text x="30" y="131" font-size="13" fill="#A8B2C7">Premium</text>
  <rect x="150" y="116" width="25" height="22" fill="#10B981" rx="3"/>
  <text x="465" y="133" font-size="14" font-weight="700" fill="#10B981">+$120 (4.9%)</text>

  <!-- Gold total row -->
  <rect x="15" y="152" width="570" height="44" fill="#1E293B" stroke="#D4A843" stroke-width="2" rx="6"/>
  <text x="30" y="180" font-size="14" font-weight="700" fill="#A8B2C7">You Pay</text>
  <text x="570" y="182" font-size="20" font-weight="800" fill="#D4A843" text-anchor="end">$2,570</text>

  <!-- ========== SILVER ========== -->
  <text x="30" y="236" font-size="15" font-weight="700" fill="#C0C0C0">Silver 100oz Bar</text>

  <!-- Silver Spot row -->
  <text x="30" y="267" font-size="13" fill="#A8B2C7">Spot Price</text>
  <rect x="150" y="252" width="300" height="22" fill="url(#silverGrad)" rx="3"/>
  <text x="465" y="269" font-size="14" font-weight="700" fill="#F1F5F9">$3,400</text>

  <!-- Silver Premium row (bar 10px = visibly smaller vs gold's 25px) -->
  <text x="30" y="299" font-size="13" fill="#A8B2C7">Premium</text>
  <rect x="150" y="284" width="10" height="22" fill="#10B981" rx="3"/>
  <text x="465" y="301" font-size="14" font-weight="700" fill="#10B981">+$68 (2%)</text>

  <!-- Silver total row -->
  <rect x="15" y="320" width="570" height="44" fill="#1E293B" stroke="#C0C0C0" stroke-width="2" rx="6"/>
  <text x="30" y="348" font-size="14" font-weight="700" fill="#A8B2C7">You Pay</text>
  <text x="570" y="350" font-size="20" font-weight="800" fill="#C0C0C0" text-anchor="end">$3,468</text>

  <!-- ========== KEY INSIGHT ========== -->
  <rect x="15" y="390" width="570" height="90" fill="#1E293B" stroke="#D4A843" stroke-width="1" rx="6"/>
  <text x="300" y="418" font-size="14" font-weight="700" fill="#D4A843" text-anchor="middle">Key Insight</text>
  <text x="300" y="443" font-size="12" fill="#CBD5E1" text-anchor="middle">Premium varies by product type. Bars typically offer lower premiums than coins.</text>
  <text x="300" y="463" font-size="12" fill="#CBD5E1" text-anchor="middle">Your true cost basis = spot price + premium paid at purchase.</text>
</svg>
