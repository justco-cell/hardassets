<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0B0F1A"/>

  <!-- Title (moved higher to avoid overlap) -->
  <text x="400" y="35" font-size="22" fill="#F1F5F9" font-family="Inter, sans-serif" text-anchor="middle" font-weight="800">Silver Supply vs. Demand (Million oz)</text>

  <!-- Grid lines -->
  <line x1="80" y1="80" x2="80" y2="350" stroke="#1E293B" stroke-width="1"/>
  <line x1="80" y1="350" x2="750" y2="350" stroke="#1E293B" stroke-width="1"/>

  <!-- Y-axis labels (Million oz) -->
  <text x="35" y="355" font-size="13" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="end">0</text>
  <text x="35" y="295" font-size="13" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="end">1,000</text>
  <text x="35" y="235" font-size="13" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="end">2,000</text>
  <text x="35" y="175" font-size="13" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="end">3,000</text>

  <!-- Horizontal grid -->
  <line x1="80" y1="290" x2="750" y2="290" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="80" y1="230" x2="750" y2="230" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="80" y1="170" x2="750" y2="170" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="2,2"/>

  <!-- Supply bar (2025) - light blue -->
  <rect x="140" y="145" width="60" height="205" fill="#3B82F6" rx="3"/>
  <text x="170" y="370" font-size="13" fill="#CBD5E1" font-family="Inter, sans-serif" text-anchor="middle" font-weight="600">2025 Supply</text>
  <text x="170" y="125" font-size="13" fill="#F1F5F9" font-family="Inter, sans-serif" text-anchor="middle" font-weight="700">3,190M</text>

  <!-- Demand bar (2025) - gold -->
  <rect x="220" y="95" width="60" height="255" fill="#D4A843" rx="3"/>
  <text x="250" y="370" font-size="13" fill="#CBD5E1" font-family="Inter, sans-serif" text-anchor="middle" font-weight="600">2025 Demand</text>
  <text x="250" y="65" font-size="13" fill="#F1F5F9" font-family="Inter, sans-serif" text-anchor="middle" font-weight="700">3,230M</text>

  <!-- 2026 Supply bar - light blue -->
  <rect x="380" y="135" width="60" height="215" fill="#3B82F6" rx="3"/>
  <text x="410" y="370" font-size="13" fill="#CBD5E1" font-family="Inter, sans-serif" text-anchor="middle" font-weight="600">2026 Supply</text>
  <text x="410" y="105" font-size="13" fill="#F1F5F9" font-family="Inter, sans-serif" text-anchor="middle" font-weight="700">3,215M</text>

  <!-- 2026 Demand bar - gold (taller, shows deficit) -->
  <rect x="460" y="55" width="60" height="295" fill="#D4A843" rx="3"/>
  <text x="490" y="370" font-size="13" fill="#CBD5E1" font-family="Inter, sans-serif" text-anchor="middle" font-weight="600">2026 Demand</text>
  <text x="490" y="30" font-size="13" fill="#F1F5F9" font-family="Inter, sans-serif" text-anchor="middle" font-weight="700">3,262M</text>

  <!-- Deficit indicator (red line showing gap) -->
  <line x1="425" y1="135" x2="425" y2="55" stroke="#FF6B6B" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="455" y="105" font-size="13" fill="#FF6B6B" font-family="Inter, sans-serif" font-weight="700">+46.3M</text>
  <text x="455" y="122" font-size="12" fill="#FF6B6B" font-family="Inter, sans-serif">deficit</text>

  <!-- Source -->
  <text x="750" y="430" font-size="11" fill="#475569" font-family="Inter, sans-serif" text-anchor="end">Source: World Silver Survey 2026</text>
</svg>