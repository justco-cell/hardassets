<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0B0F1A"/>

  <!-- Title -->
  <text x="400" y="38" font-size="22" fill="#F1F5F9" font-family="Inter, sans-serif" text-anchor="middle" font-weight="800">How Gold Is Taxed: IRA vs. Personal Ownership</text>
  <text x="400" y="62" font-size="13" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="middle">Federal long-term capital gains rates (held 1+ years), 2026 tax year</text>

  <!-- Y axis line -->
  <line x1="100" y1="110" x2="100" y2="370" stroke="#1E293B" stroke-width="1"/>
  <line x1="100" y1="370" x2="760" y2="370" stroke="#1E293B" stroke-width="1"/>

  <!-- Y labels (0-35%) -->
  <text x="90" y="375" font-size="12" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="end">0%</text>
  <text x="90" y="335" font-size="12" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="end">7%</text>
  <text x="90" y="295" font-size="12" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="end">14%</text>
  <text x="90" y="255" font-size="12" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="end">21%</text>
  <text x="90" y="215" font-size="12" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="end">28%</text>
  <text x="90" y="175" font-size="12" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="end">35%</text>

  <!-- Grid -->
  <line x1="100" y1="330" x2="760" y2="330" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="100" y1="290" x2="760" y2="290" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="100" y1="250" x2="760" y2="250" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="100" y1="210" x2="760" y2="210" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="100" y1="170" x2="760" y2="170" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="2,2"/>

  <!-- Bar 1: Stock LTCG top rate 20% -->
  <rect x="140" y="256" width="90" height="114" fill="#3B82F6" rx="3"/>
  <text x="185" y="395" font-size="12" fill="#CBD5E1" font-family="Inter, sans-serif" text-anchor="middle" font-weight="600">Stocks</text>
  <text x="185" y="411" font-size="11" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="middle">(long-term)</text>
  <text x="185" y="246" font-size="13" fill="#F1F5F9" font-family="Inter, sans-serif" text-anchor="middle" font-weight="700">20%</text>

  <!-- Bar 2: Physical Gold 28% (collectibles) -->
  <rect x="260" y="210" width="90" height="160" fill="#FF6B6B" rx="3"/>
  <text x="305" y="395" font-size="12" fill="#CBD5E1" font-family="Inter, sans-serif" text-anchor="middle" font-weight="600">Physical</text>
  <text x="305" y="411" font-size="11" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="middle">Gold</text>
  <text x="305" y="200" font-size="13" fill="#F1F5F9" font-family="Inter, sans-serif" text-anchor="middle" font-weight="700">28%</text>

  <!-- Bar 3: Gold ETFs 28% (same rate) -->
  <rect x="380" y="210" width="90" height="160" fill="#FF6B6B" rx="3" opacity="0.85"/>
  <text x="425" y="395" font-size="12" fill="#CBD5E1" font-family="Inter, sans-serif" text-anchor="middle" font-weight="600">Gold ETFs</text>
  <text x="425" y="411" font-size="11" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="middle">(GLD, IAU)</text>
  <text x="425" y="200" font-size="13" fill="#F1F5F9" font-family="Inter, sans-serif" text-anchor="middle" font-weight="700">28%</text>

  <!-- Bar 4: Gold IRA (Traditional) - ordinary income, ~22-35% -->
  <rect x="500" y="185" width="90" height="185" fill="#D4A843" rx="3"/>
  <text x="545" y="395" font-size="12" fill="#CBD5E1" font-family="Inter, sans-serif" text-anchor="middle" font-weight="600">Traditional</text>
  <text x="545" y="411" font-size="11" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="middle">Gold IRA</text>
  <text x="545" y="175" font-size="13" fill="#F1F5F9" font-family="Inter, sans-serif" text-anchor="middle" font-weight="700">~22–32%*</text>

  <!-- Bar 5: Roth Gold IRA - 0% -->
  <rect x="620" y="365" width="90" height="5" fill="#34D399" rx="3"/>
  <text x="665" y="395" font-size="12" fill="#CBD5E1" font-family="Inter, sans-serif" text-anchor="middle" font-weight="600">Roth</text>
  <text x="665" y="411" font-size="11" fill="#94A3B8" font-family="Inter, sans-serif" text-anchor="middle">Gold IRA</text>
  <text x="665" y="355" font-size="13" fill="#34D399" font-family="Inter, sans-serif" text-anchor="middle" font-weight="700">0%</text>

  <!-- Footer note -->
  <text x="400" y="440" font-size="11" fill="#64748B" font-family="Inter, sans-serif" text-anchor="middle">*Traditional IRA distributions taxed as ordinary income. Actual rate depends on your bracket at withdrawal.</text>
</svg>
