<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0B0F1A"/>

  <!-- Title -->
  <text x="400" y="30" font-size="24" font-weight="700" fill="#F1F5F9" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">Top Central Bank Gold Holders &amp; Recent Buyers</text>
  <text x="400" y="52" font-size="13" fill="#94A3B8" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">Who's Hoarding Gold in 2025-2026</text>

  <!-- Legend -->
  <rect x="90" y="65" width="12" height="12" fill="#D4A843" rx="2"/>
  <text x="110" y="74" font-size="11" fill="#CBD5E1" font-family="Inter,-apple-system,sans-serif">Historic Holders</text>

  <rect x="300" y="65" width="12" height="12" fill="#34D399" rx="2"/>
  <text x="320" y="74" font-size="11" fill="#CBD5E1" font-family="Inter,-apple-system,sans-serif">Active Recent Buyers</text>

  <!-- Y-axis label -->
  <text x="50" y="120" font-size="11" fill="#94A3B8" font-family="Inter,-apple-system,sans-serif">Tonnes</text>

  <!-- Grid -->
  <line x1="85" y1="95" x2="85" y2="460" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
  <line x1="85" y1="460" x2="750" y2="460" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>

  <!-- Scale markers -->
  <text x="75" y="465" font-size="11" fill="#94A3B8" text-anchor="end" font-family="monospace">0</text>
  <text x="75" y="380" font-size="11" fill="#94A3B8" text-anchor="end" font-family="monospace">5K</text>
  <text x="75" y="295" font-size="11" fill="#94A3B8" text-anchor="end" font-family="monospace">10K</text>

  <!-- Grid lines -->
  <line x1="80" y1="375" x2="750" y2="375" stroke="rgba(212,168,67,0.1)" stroke-width="1"/>
  <line x1="80" y1="290" x2="750" y2="290" stroke="rgba(212,168,67,0.1)" stroke-width="1"/>

  <!-- US (8,133 tonnes) - Historic holder -->
  <rect x="100" y="160" width="55" height="300" fill="#D4A843" rx="3"/>
  <text x="127.5" y="475" font-size="12" font-weight="600" fill="#F1F5F9" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">USA</text>
  <text x="127.5" y="150" font-size="12" font-weight="700" fill="#D4A843" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">8,133T</text>

  <!-- Germany (3,355 tonnes) - Historic holder -->
  <rect x="170" y="300" width="55" height="160" fill="#D4A843" rx="3"/>
  <text x="197.5" y="475" font-size="12" font-weight="600" fill="#F1F5F9" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">Germany</text>
  <text x="197.5" y="290" font-size="12" font-weight="700" fill="#D4A843" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">3,355T</text>

  <!-- China (2,191 tonnes) - Active recent buyer -->
  <rect x="240" y="330" width="55" height="130" fill="#34D399" rx="3"/>
  <text x="267.5" y="475" font-size="12" font-weight="600" fill="#F1F5F9" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">China</text>
  <text x="267.5" y="320" font-size="12" font-weight="700" fill="#34D399" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">2,191T</text>
  <text x="267.5" y="337" font-size="9" fill="#94A3B8" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">+buying</text>

  <!-- Italy (2,452 tonnes) - Historic holder -->
  <rect x="310" y="315" width="55" height="145" fill="#D4A843" rx="3"/>
  <text x="337.5" y="475" font-size="12" font-weight="600" fill="#F1F5F9" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">Italy</text>
  <text x="337.5" y="305" font-size="12" font-weight="700" fill="#D4A843" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">2,452T</text>

  <!-- France (2,437 tonnes) - Historic holder -->
  <rect x="380" y="320" width="55" height="140" fill="#D4A843" rx="3"/>
  <text x="407.5" y="475" font-size="12" font-weight="600" fill="#F1F5F9" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">France</text>
  <text x="407.5" y="310" font-size="12" font-weight="700" fill="#D4A843" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">2,437T</text>

  <!-- India (742 tonnes) - Active recent buyer -->
  <rect x="450" y="385" width="55" height="75" fill="#34D399" rx="3"/>
  <text x="477.5" y="475" font-size="12" font-weight="600" fill="#F1F5F9" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">India</text>
  <text x="477.5" y="375" font-size="12" font-weight="700" fill="#34D399" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">742T</text>
  <text x="477.5" y="382" font-size="9" fill="#94A3B8" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">+buying</text>

  <!-- Turkey (654 tonnes) - Active recent buyer -->
  <rect x="520" y="400" width="55" height="60" fill="#34D399" rx="3"/>
  <text x="547.5" y="475" font-size="12" font-weight="600" fill="#F1F5F9" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">Turkey</text>
  <text x="547.5" y="390" font-size="12" font-weight="700" fill="#34D399" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">654T</text>
  <text x="547.5" y="397" font-size="9" fill="#94A3B8" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">+buying</text>

  <!-- Poland (654 tonnes) - Active recent buyer -->
  <rect x="590" y="400" width="55" height="60" fill="#34D399" rx="3"/>
  <text x="617.5" y="475" font-size="12" font-weight="600" fill="#F1F5F9" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">Poland</text>
  <text x="617.5" y="390" font-size="12" font-weight="700" fill="#34D399" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">654T</text>
  <text x="617.5" y="397" font-size="9" fill="#94A3B8" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">+buying</text>

  <!-- Insight box -->
  <rect x="670" y="90" width="115" height="140" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.3)" stroke-width="1" rx="8"/>
  <text x="727.5" y="112" font-size="11" font-weight="700" fill="#34D399" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">Pattern:</text>
  <text x="680" y="133" font-size="9" fill="#CBD5E1" text-anchor="start" font-family="Inter,-apple-system,sans-serif">Western banks</text>
  <text x="680" y="147" font-size="9" fill="#CBD5E1" text-anchor="start" font-family="Inter,-apple-system,sans-serif">hold most gold,</text>
  <text x="680" y="161" font-size="9" fill="#CBD5E1" text-anchor="start" font-family="Inter,-apple-system,sans-serif">but Eastern/EM</text>
  <text x="680" y="175" font-size="9" fill="#CBD5E1" text-anchor="start" font-family="Inter,-apple-system,sans-serif">banks are the</text>
  <text x="680" y="189" font-size="9" fill="#CBD5E1" text-anchor="start" font-family="Inter,-apple-system,sans-serif">new buyers</text>

  <!-- Footer -->
  <text x="400" y="495" font-size="10" fill="#475569" text-anchor="middle" font-family="Inter,-apple-system,sans-serif">Source: World Gold Council, IMF Gold Statistics | Data as of Q1 2026</text>
</svg>