<svg viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="480" fill="#0B0F1A"/>

  <text x="300" y="36" font-size="20" font-weight="bold" fill="#F1F5F9" text-anchor="middle">Home Storage Security Checklist for Precious Metals</text>
  <text x="300" y="58" font-size="12" fill="#94A3B8" text-anchor="middle">7 non-negotiable rules for protecting gold and silver at home</text>

  <g>
    <rect x="40" y="80" width="520" height="50" fill="#1E293B" stroke="#D4A843" stroke-width="1" rx="4"/>
    <text x="60" y="108" font-size="22" fill="#D4A843" font-weight="bold">1.</text>
    <text x="90" y="105" font-size="13" font-weight="700" fill="#F1F5F9">Choose at least a TL-30 rated burglary safe</text>
    <text x="90" y="123" font-size="11" fill="#CBD5E1">TL-15 is a 30-minute delay against common tools. TL-30 is higher end. Avoid RSC-rated only.</text>
  </g>

  <g>
    <rect x="40" y="140" width="520" height="50" fill="#1E293B" stroke="#10B981" stroke-width="1" rx="4"/>
    <text x="60" y="168" font-size="22" fill="#10B981" font-weight="bold">2.</text>
    <text x="90" y="165" font-size="13" font-weight="700" fill="#F1F5F9">Bolt the safe to the concrete floor</text>
    <text x="90" y="183" font-size="11" fill="#CBD5E1">A 300 lb safe that isn't bolted down can be carried away on a dolly in under 3 minutes.</text>
  </g>

  <g>
    <rect x="40" y="200" width="520" height="50" fill="#1E293B" stroke="#F59E0B" stroke-width="1" rx="4"/>
    <text x="60" y="228" font-size="22" fill="#F59E0B" font-weight="bold">3.</text>
    <text x="90" y="225" font-size="13" font-weight="700" fill="#F1F5F9">Install in an interior, concealed location</text>
    <text x="90" y="243" font-size="11" fill="#CBD5E1">Basement closet or under stairs. Avoid master bedroom — first place burglars check.</text>
  </g>

  <g>
    <rect x="40" y="260" width="520" height="50" fill="#1E293B" stroke="#06B6D4" stroke-width="1" rx="4"/>
    <text x="60" y="288" font-size="22" fill="#06B6D4" font-weight="bold">4.</text>
    <text x="90" y="285" font-size="13" font-weight="700" fill="#F1F5F9">Use a fireproof safe with 90-minute rating</text>
    <text x="90" y="303" font-size="11" fill="#CBD5E1">Gold melts at 1,948°F, silver at 1,763°F. House fires commonly exceed 1,500°F.</text>
  </g>

  <g>
    <rect x="40" y="320" width="520" height="50" fill="#1E293B" stroke="#EC4899" stroke-width="1" rx="4"/>
    <text x="60" y="348" font-size="22" fill="#EC4899" font-weight="bold">5.</text>
    <text x="90" y="345" font-size="13" font-weight="700" fill="#F1F5F9">Add private bullion insurance — don't rely on homeowners</text>
    <text x="90" y="363" font-size="11" fill="#CBD5E1">Standard homeowners caps coverage at $1,000–$2,500. Riders or scheduled policies are essential.</text>
  </g>

  <g>
    <rect x="40" y="380" width="520" height="50" fill="#1E293B" stroke="#A855F7" stroke-width="1" rx="4"/>
    <text x="60" y="408" font-size="22" fill="#A855F7" font-weight="bold">6.</text>
    <text x="90" y="405" font-size="13" font-weight="700" fill="#F1F5F9">Keep an offline digital inventory with serials and photos</text>
    <text x="90" y="423" font-size="11" fill="#CBD5E1">Needed for insurance claims, estate planning, and accurate cost basis tracking.</text>
  </g>

  <g>
    <rect x="40" y="440" width="520" height="30" fill="#1E293B" stroke="#64748B" stroke-width="1" rx="4"/>
    <text x="60" y="462" font-size="15" fill="#64748B" font-weight="bold">7.</text>
    <text x="90" y="460" font-size="12" font-weight="700" fill="#CBD5E1">Tell no one — and warn household members not to talk about it either.</text>
  </g>
</svg>
