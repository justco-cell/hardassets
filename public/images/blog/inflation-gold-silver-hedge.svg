<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0B0F1A"/>

  <!-- Grid lines -->
  <line x1="60" y1="50" x2="60" y2="420" stroke="#1E293B" stroke-width="1"/>
  <line x1="60" y1="420" x2="760" y2="420" stroke="#1E293B" stroke-width="1"/>
  <line x1="60" y1="320" x2="760" y2="320" stroke="#1E293B" stroke-width="1" style="stroke-dasharray:4"/>
  <line x1="60" y1="220" x2="760" y2="220" stroke="#1E293B" stroke-width="1" style="stroke-dasharray:4"/>
  <line x1="60" y1="120" x2="760" y2="120" stroke="#1E293B" stroke-width="1" style="stroke-dasharray:4"/>

  <!-- Y-axis labels -->
  <text x="35" y="425" font-size="12" fill="#94A3B8" text-anchor="end" font-family="Inter, sans-serif">0%</text>
  <text x="35" y="325" font-size="12" fill="#94A3B8" text-anchor="end" font-family="Inter, sans-serif">25%</text>
  <text x="35" y="225" font-size="12" fill="#94A3B8" text-anchor="end" font-family="Inter, sans-serif">50%</text>
  <text x="35" y="125" font-size="12" fill="#94A3B8" text-anchor="end" font-family="Inter, sans-serif">75%</text>
  <text x="35" y="55" font-size="12" fill="#94A3B8" text-anchor="end" font-family="Inter, sans-serif">100%</text>

  <!-- X-axis labels -->
  <text x="140" y="445" font-size="12" fill="#94A3B8" text-anchor="middle" font-family="Inter, sans-serif">2024</text>
  <text x="340" y="445" font-size="12" fill="#94A3B8" text-anchor="middle" font-family="Inter, sans-serif">Apr 2025</text>
  <text x="540" y="445" font-size="12" fill="#94A3B8" text-anchor="middle" font-family="Inter, sans-serif">Jan 2026</text>
  <text x="740" y="445" font-size="12" fill="#94A3B8" text-anchor="middle" font-family="Inter, sans-serif">Apr 2026</text>

  <!-- Inflation line (red) -->
  <polyline points="60,350 210,340 360,280 510,260 660,250" fill="none" stroke="#EF4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gold line (gold) -->
  <polyline points="60,380 210,320 360,150 510,140 660,170" fill="none" stroke="#D4A843" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Silver line (light blue) -->
  <polyline points="60,390 210,310 360,100 510,80 660,110" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="400" y="30" font-size="20" font-weight="800" fill="#F1F5F9" text-anchor="middle" font-family="Inter, sans-serif">Inflation vs Gold &amp; Silver (2024-2026)</text>

  <!-- Legend -->
  <rect x="100" y="460" width="12" height="12" fill="#EF4444"/>
  <text x="120" y="469" font-size="13" fill="#F1F5F9" font-family="Inter, sans-serif">Inflation (CPI/PCE)</text>

  <rect x="350" y="460" width="12" height="12" fill="#D4A843"/>
  <text x="370" y="469" font-size="13" fill="#F1F5F9" font-family="Inter, sans-serif">Gold Price</text>

  <rect x="580" y="460" width="12" height="12" fill="#38BDF8"/>
  <text x="600" y="469" font-size="13" fill="#F1F5F9" font-family="Inter, sans-serif">Silver Price</text>

  <!-- Data annotation -->
  <text x="660" y="165" font-size="11" fill="#CBD5E1" font-family="monospace">+50%</text>
  <text x="660" y="105" font-size="11" fill="#CBD5E1" font-family="monospace">+131%</text>
  <text x="660" y="245" font-size="11" fill="#CBD5E1" font-family="monospace">3.7%</text>
</svg>
