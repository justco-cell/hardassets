<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0B0F1A"/>
  <g>
    <text x="40" y="60" font-size="32" font-weight="900" fill="#F1F5F9" font-family="Inter, sans-serif">AI Chip Silver Content</text>
    <text x="40" y="90" font-size="14" fill="#94A3B8" font-family="Inter, sans-serif">Silver requirements per processor generation (grams)</text>
  </g>

  <!-- Bars -->
  <g>
    <!-- 2020 baseline -->
    <rect x="80" y="240" width="40" height="80" fill="#D4A843" opacity="0.6"/>
    <text x="100" y="330" font-size="12" fill="#94A3B8" text-anchor="middle" font-family="monospace">2020</text>
    <text x="100" y="180" font-size="14" fill="#F1F5F9" text-anchor="middle" font-weight="700">0.8g</text>

    <!-- 2022 -->
    <rect x="160" y="200" width="40" height="120" fill="#D4A843" opacity="0.8"/>
    <text x="180" y="330" font-size="12" fill="#94A3B8" text-anchor="middle" font-family="monospace">2022</text>
    <text x="180" y="155" font-size="14" fill="#F1F5F9" text-anchor="middle" font-weight="700">1.2g</text>

    <!-- 2024 -->
    <rect x="240" y="140" width="40" height="180" fill="#D4A843"/>
    <text x="260" y="330" font-size="12" fill="#94A3B8" text-anchor="middle" font-family="monospace">2024</text>
    <text x="260" y="85" font-size="14" fill="#F1F5F9" text-anchor="middle" font-weight="700">1.8g</text>

    <!-- 2026 (projected) -->
    <rect x="320" y="80" width="40" height="240" fill="#34D399"/>
    <text x="340" y="330" font-size="12" fill="#94A3B8" text-anchor="middle" font-family="monospace">2026</text>
    <text x="340" y="20" font-size="14" fill="#F1F5F9" text-anchor="middle" font-weight="700">2.4g</text>
  </g>

  <!-- Axis -->
  <line x1="60" y1="320" x2="400" y2="320" stroke="#52647A" stroke-width="2"/>
  <line x1="60" y1="320" x2="60" y2="40" stroke="#52647A" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="50" y="330" font-size="11" fill="#94A3B8" text-anchor="end" font-family="monospace">0</text>
  <text x="50" y="225" font-size="11" fill="#94A3B8" text-anchor="end" font-family="monospace">1g</text>
  <text x="50" y="125" font-size="11" fill="#94A3B8" text-anchor="end" font-family="monospace">2g</text>

  <!-- Supply vs Demand section -->
  <g>
    <text x="500" y="60" font-size="18" font-weight="800" fill="#F1F5F9" font-family="Inter, sans-serif">Silver Deficit</text>
    <text x="500" y="85" font-size="12" fill="#94A3B8" font-family="Inter, sans-serif">6 consecutive years of shortage</text>

    <!-- Supply bar -->
    <rect x="500" y="120" width="80" height="60" fill="#F87171" rx="4"/>
    <text x="540" y="155" font-size="13" fill="#F1F5F9" text-anchor="middle" font-weight="700">Supply</text>

    <!-- Demand bar (longer) -->
    <rect x="620" y="100" width="130" height="60" fill="#34D399" rx="4"/>
    <text x="685" y="135" font-size="13" fill="#0B0F1A" text-anchor="middle" font-weight="700">Demand</text>
  </g>

  <!-- Footer -->
  <text x="400" y="390" font-size="11" fill="#52647A" text-anchor="middle" font-family="monospace">Data: Silver Institute 2026 Report</text>
</svg>