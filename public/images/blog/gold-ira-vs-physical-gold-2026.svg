<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0B0F1A"/>

  <!-- Title -->
  <text x="400" y="38" font-size="26" font-weight="bold" text-anchor="middle" fill="#F1F5F9">
    Gold IRA vs Physical Gold (2026)
  </text>
  <text x="400" y="62" font-size="13" text-anchor="middle" fill="#94A3B8">
    Spot gold: $4,710 / oz · 7 differences that matter for retirement
  </text>

  <!-- Column headers -->
  <rect x="50" y="85" width="240" height="44" fill="#1E293B" stroke="#D4A843" stroke-width="2" rx="8"/>
  <text x="170" y="113" font-size="15" font-weight="700" text-anchor="middle" fill="#D4A843">Comparison</text>

  <rect x="300" y="85" width="240" height="44" fill="#1E293B" stroke="#D4A843" stroke-width="2" rx="8"/>
  <text x="420" y="113" font-size="15" font-weight="700" text-anchor="middle" fill="#F1F5F9">Gold IRA</text>

  <rect x="550" y="85" width="200" height="44" fill="#1E293B" stroke="#D4A843" stroke-width="2" rx="8"/>
  <text x="650" y="113" font-size="15" font-weight="700" text-anchor="middle" fill="#F1F5F9">Physical Gold</text>

  <!-- Row: Tax Treatment -->
  <text x="60" y="155" font-size="13" font-weight="600" fill="#F1F5F9">Tax Treatment</text>
  <text x="310" y="155" font-size="12" fill="#34D399">Tax-deferred or tax-free</text>
  <text x="560" y="155" font-size="12" fill="#94A3B8">28% collectibles rate</text>

  <!-- Row: Storage -->
  <text x="60" y="195" font-size="13" font-weight="600" fill="#F1F5F9">Storage</text>
  <text x="310" y="195" font-size="12" fill="#94A3B8">IRS-approved depository</text>
  <text x="560" y="195" font-size="12" fill="#34D399">Home, safe, vault</text>

  <!-- Row: Annual Fees -->
  <text x="60" y="235" font-size="13" font-weight="600" fill="#F1F5F9">Annual Fees</text>
  <text x="310" y="235" font-size="12" fill="#94A3B8">$200 – $500 per year</text>
  <text x="560" y="235" font-size="12" fill="#34D399">$0 – $150 (insurance)</text>

  <!-- Row: Possession -->
  <text x="60" y="275" font-size="13" font-weight="600" fill="#F1F5F9">Possession</text>
  <text x="310" y="275" font-size="12" fill="#94A3B8">Custodian holds it</text>
  <text x="560" y="275" font-size="12" fill="#34D399">In your hands</text>

  <!-- Row: Liquidity -->
  <text x="60" y="315" font-size="13" font-weight="600" fill="#F1F5F9">Liquidity</text>
  <text x="310" y="315" font-size="12" fill="#94A3B8">3 – 7 business days</text>
  <text x="560" y="315" font-size="12" fill="#34D399">Same-day at LCS</text>

  <!-- Row: Approved Forms -->
  <text x="60" y="355" font-size="13" font-weight="600" fill="#F1F5F9">Approved Forms</text>
  <text x="310" y="355" font-size="12" fill="#94A3B8">99.5%+ purity only</text>
  <text x="560" y="355" font-size="12" fill="#34D399">Any coin, bar, jewelry</text>

  <!-- Row: RMDs -->
  <text x="60" y="395" font-size="13" font-weight="600" fill="#F1F5F9">RMDs at 73</text>
  <text x="310" y="395" font-size="12" fill="#94A3B8">Required by IRS</text>
  <text x="560" y="395" font-size="12" fill="#34D399">No requirement</text>

  <!-- Divider lines -->
  <line x1="50" y1="170" x2="750" y2="170" stroke="#1E293B" stroke-width="1"/>
  <line x1="50" y1="210" x2="750" y2="210" stroke="#1E293B" stroke-width="1"/>
  <line x1="50" y1="250" x2="750" y2="250" stroke="#1E293B" stroke-width="1"/>
  <line x1="50" y1="290" x2="750" y2="290" stroke="#1E293B" stroke-width="1"/>
  <line x1="50" y1="330" x2="750" y2="330" stroke="#1E293B" stroke-width="1"/>
  <line x1="50" y1="370" x2="750" y2="370" stroke="#1E293B" stroke-width="1"/>

  <!-- Bottom takeaway box -->
  <rect x="50" y="420" width="700" height="60" fill="rgba(212,168,67,0.05)" stroke="#D4A843" stroke-width="2" rx="8"/>
  <text x="70" y="445" font-size="12" font-weight="700" fill="#D4A843">The Tradeoff:</text>
  <text x="70" y="465" font-size="12" fill="#CBD5E1">
    Gold IRAs trade possession and flexibility for tax efficiency. Physical gold trades tax efficiency for control.
  </text>
</svg>
