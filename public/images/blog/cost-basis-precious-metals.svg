<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#D4A843"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0B0F1A"/>

  <!-- Title -->
  <text x="400" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#F1F5F9">
    Cost Basis Calculation Breakdown
  </text>

  <!-- Purchase example label -->
  <text x="50" y="75" font-size="14" font-weight="600" fill="#D4A843">
    Example: Buying 10 oz Silver
  </text>

  <!-- Item 1: Spot Price -->
  <rect x="50" y="95" width="300" height="70" fill="#1E293B" stroke="#D4A843" stroke-width="2" rx="8"/>
  <text x="70" y="120" font-size="13" font-weight="600" fill="#F1F5F9">Spot Price</text>
  <text x="70" y="145" font-size="12" fill="#94A3B8">10 oz × $25.50/oz</text>
  <text x="280" y="145" font-size="16" font-weight="bold" text-anchor="end" fill="#34D399">$255</text>
  <text x="70" y="160" font-size="11" fill="#475569">(Published market price)</text>

  <!-- Item 2: Dealer Premium -->
  <rect x="450" y="95" width="300" height="70" fill="#1E293B" stroke="#D4A843" stroke-width="2" rx="8"/>
  <text x="470" y="120" font-size="13" font-weight="600" fill="#F1F5F9">Dealer Premium</text>
  <text x="470" y="145" font-size="12" fill="#94A3B8">2% markup above spot</text>
  <text x="680" y="145" font-size="16" font-weight="bold" text-anchor="end" fill="#34D399">$5.10</text>
  <text x="470" y="160" font-size="11" fill="#475569">(Dealer profit + costs)</text>

  <!-- Item 3: Shipping -->
  <rect x="50" y="185" width="300" height="70" fill="#1E293B" stroke="#D4A843" stroke-width="2" rx="8"/>
  <text x="70" y="210" font-size="13" font-weight="600" fill="#F1F5F9">Shipping &amp; Insurance</text>
  <text x="70" y="235" font-size="12" fill="#94A3B8">Registered mail + insurance</text>
  <text x="280" y="235" font-size="16" font-weight="bold" text-anchor="end" fill="#34D399">$15</text>
  <text x="70" y="250" font-size="11" fill="#475569">(Acquisition cost)</text>

  <!-- Item 4: Total Cost Basis -->
  <rect x="450" y="185" width="300" height="70" fill="#1E293B" stroke="#D4A843" stroke-width="2" rx="8"/>
  <text x="470" y="210" font-size="13" font-weight="600" fill="#D4A843">TOTAL COST BASIS</text>
  <text x="470" y="235" font-size="12" fill="#94A3B8">Per ounce: $27.51</text>
  <text x="680" y="235" font-size="16" font-weight="bold" text-anchor="end" fill="#D4A843">$275.10</text>
  <text x="470" y="250" font-size="11" fill="#94A3B8">(Your true purchase cost)</text>

  <!-- Arrows -->
  <line x1="350" y1="130" x2="420" y2="130" stroke="#D4A843" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="220" x2="420" y2="220" stroke="#D4A843" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Formula section -->
  <rect x="50" y="280" width="700" height="80" fill="#111827" stroke="#94A3B8" stroke-width="1" rx="8"/>
  <text x="400" y="310" font-size="13" font-weight="600" text-anchor="middle" fill="#F1F5F9">
    Average Cost Basis Formula
  </text>
  <text x="400" y="340" font-size="14" text-anchor="middle" fill="#D4A843" font-family="monospace">
    Cost Basis Per Oz = Total Spent ÷ Total Ounces
  </text>
  <text x="400" y="360" font-size="12" text-anchor="middle" fill="#94A3B8">
    Use this for tax reporting and capital gains calculation
  </text>

  <!-- Key note -->
  <rect x="50" y="385" width="700" height="80" fill="rgba(212,168,67,0.05)" stroke="#D4A843" stroke-width="2" rx="8"/>
  <text x="70" y="410" font-size="12" font-weight="600" fill="#D4A843">Key Point:</text>
  <text x="70" y="435" font-size="12" fill="#CBD5E1">
    Cost basis includes premium, shipping, and all acquisition costs.
  </text>
  <text x="70" y="455" font-size="12" fill="#CBD5E1">
    This is what the IRS uses for capital gains calculations.
  </text>
</svg>