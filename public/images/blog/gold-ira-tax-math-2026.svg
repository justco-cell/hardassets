<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="460" fill="#0B0F1A"/>

  <!-- Title -->
  <text x="400" y="38" font-size="24" font-weight="bold" text-anchor="middle" fill="#F1F5F9">
    The Tax Math: $50,000 Gold Position Over 20 Years
  </text>
  <text x="400" y="62" font-size="13" text-anchor="middle" fill="#94A3B8">
    Assumes 7% annual gold appreciation, sold at end of year 20
  </text>

  <!-- Physical Gold column -->
  <rect x="50" y="90" width="340" height="320" fill="#111827" stroke="#94A3B8" stroke-width="1" rx="10"/>
  <text x="220" y="120" font-size="16" font-weight="700" text-anchor="middle" fill="#F1F5F9">Physical Gold (Taxable)</text>

  <text x="70" y="155" font-size="13" fill="#94A3B8">Initial purchase</text>
  <text x="370" y="155" font-size="13" font-weight="600" text-anchor="end" fill="#F1F5F9">$50,000</text>

  <text x="70" y="185" font-size="13" fill="#94A3B8">Value after 20 years</text>
  <text x="370" y="185" font-size="13" font-weight="600" text-anchor="end" fill="#F1F5F9">$193,484</text>

  <text x="70" y="215" font-size="13" fill="#94A3B8">Long-term gain</text>
  <text x="370" y="215" font-size="13" font-weight="600" text-anchor="end" fill="#F1F5F9">$143,484</text>

  <text x="70" y="245" font-size="13" fill="#94A3B8">Collectibles tax (28%)</text>
  <text x="370" y="245" font-size="13" font-weight="600" text-anchor="end" fill="#EF4444">– $40,176</text>

  <line x1="70" y1="265" x2="370" y2="265" stroke="#94A3B8" stroke-width="1"/>

  <text x="70" y="290" font-size="14" font-weight="700" fill="#D4A843">Net after-tax proceeds</text>
  <text x="370" y="290" font-size="16" font-weight="700" text-anchor="end" fill="#D4A843">$153,308</text>

  <text x="70" y="335" font-size="12" fill="#94A3B8">Plus: no annual storage / custodian fees</text>
  <text x="70" y="355" font-size="12" fill="#94A3B8">Plus: instant access to physical metal</text>
  <text x="70" y="375" font-size="12" fill="#94A3B8">Minus: insurance, security responsibility</text>

  <!-- Gold IRA column -->
  <rect x="410" y="90" width="340" height="320" fill="#111827" stroke="#D4A843" stroke-width="2" rx="10"/>
  <text x="580" y="120" font-size="16" font-weight="700" text-anchor="middle" fill="#D4A843">Traditional Gold IRA</text>

  <text x="430" y="155" font-size="13" fill="#94A3B8">Initial purchase</text>
  <text x="730" y="155" font-size="13" font-weight="600" text-anchor="end" fill="#F1F5F9">$50,000</text>

  <text x="430" y="185" font-size="13" fill="#94A3B8">Value after 20 years</text>
  <text x="730" y="185" font-size="13" font-weight="600" text-anchor="end" fill="#F1F5F9">$193,484</text>

  <text x="430" y="215" font-size="13" fill="#94A3B8">20 yrs of fees ($300/yr)</text>
  <text x="730" y="215" font-size="13" font-weight="600" text-anchor="end" fill="#EF4444">– $6,000</text>

  <text x="430" y="245" font-size="13" fill="#94A3B8">Ordinary income tax (24%)</text>
  <text x="730" y="245" font-size="13" font-weight="600" text-anchor="end" fill="#EF4444">– $44,996</text>

  <line x1="430" y1="265" x2="730" y2="265" stroke="#D4A843" stroke-width="1"/>

  <text x="430" y="290" font-size="14" font-weight="700" fill="#34D399">Net after-tax proceeds</text>
  <text x="730" y="290" font-size="16" font-weight="700" text-anchor="end" fill="#34D399">$142,488</text>

  <text x="430" y="335" font-size="12" fill="#94A3B8">Roth Gold IRA: $0 tax = $187,484</text>
  <text x="430" y="355" font-size="12" fill="#94A3B8">Outcome flips for high-bracket retirees</text>
  <text x="430" y="375" font-size="12" fill="#94A3B8">RMDs required starting at age 73</text>

  <!-- Footnote -->
  <text x="400" y="440" font-size="11" text-anchor="middle" fill="#475569">
    Illustrative only — your bracket, fee schedule, and holding period change the math materially.
  </text>
</svg>
