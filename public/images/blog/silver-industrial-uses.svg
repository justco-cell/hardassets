<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#0B0F1A"/>

  <!-- Title -->
  <g>
    <text x="400" y="40" font-size="28" font-weight="900" fill="#F1F5F9" text-anchor="middle" font-family="Inter, sans-serif">Industrial Silver Demand by Sector</text>
    <text x="400" y="65" font-size="12" fill="#94A3B8" text-anchor="middle" font-family="Inter, sans-serif">2026 estimated allocation (million ounces/year)</text>
  </g>

  <!-- Pie chart visual representation with segments -->
  <g>
    <!-- Solar (40%) - largest segment -->
    <ellipse cx="250" cy="250" rx="120" ry="120" fill="none" stroke="#D4A843" stroke-width="48" opacity="0.9" stroke-dasharray="480 1200" stroke-dashoffset="0"/>
    <text x="250" y="140" font-size="14" fill="#D4A843" text-anchor="middle" font-weight="700">Solar</text>
    <text x="250" y="158" font-size="18" fill="#F1F5F9" text-anchor="middle" font-weight="900">200M oz</text>
    <text x="250" y="175" font-size="12" fill="#94A3B8" text-anchor="middle">40%</text>

    <!-- Electronics & AI (25%) -->
    <ellipse cx="250" cy="250" rx="120" ry="120" fill="none" stroke="#34D399" stroke-width="30" opacity="0.9" stroke-dasharray="300 1200" stroke-dashoffset="480"/>
    <text x="380" y="200" font-size="12" fill="#34D399" font-weight="700">Electronics</text>
    <text x="380" y="216" font-size="12" fill="#34D399" font-weight="700">& AI Chips</text>
    <text x="380" y="233" font-size="16" fill="#F1F5F9" font-weight="900">125M oz</text>
    <text x="380" y="250" font-size="11" fill="#94A3B8">25%</text>

    <!-- Automotive (15%) -->
    <ellipse cx="250" cy="250" rx="120" ry="120" fill="none" stroke="#FBBF24" stroke-width="18" opacity="0.9" stroke-dasharray="180 1200" stroke-dashoffset="780"/>
    <text x="380" y="310" font-size="12" fill="#FBBF24" font-weight="700">Automotive</text>
    <text x="380" y="327" font-size="12" fill="#FBBF24" font-weight="700">(EVs)</text>
    <text x="380" y="344" font-size="16" fill="#F1F5F9" font-weight="900">75M oz</text>
    <text x="380" y="361" font-size="11" fill="#94A3B8">15%</text>

    <!-- Other (20%) -->
    <ellipse cx="250" cy="250" rx="120" ry="120" fill="none" stroke="#A78BFA" stroke-width="24" opacity="0.9" stroke-dasharray="240 1200" stroke-dashoffset="960"/>
    <text x="80" y="280" font-size="12" fill="#A78BFA" font-weight="700">Jewelry,</text>
    <text x="80" y="297" font-size="12" fill="#A78BFA" font-weight="700">Medical,</text>
    <text x="80" y="314" font-size="12" fill="#A78BFA" font-weight="700">Other</text>
    <text x="80" y="331" font-size="16" fill="#F1F5F9" font-weight="900">100M oz</text>
    <text x="80" y="348" font-size="11" fill="#94A3B8">20%</text>
  </g>

  <!-- Key insight box -->
  <g>
    <rect x="50" y="420" width="700" height="60" fill="rgba(212,168,67,0.1)" rx="8" stroke="rgba(212,168,67,0.2)" stroke-width="1"/>
    <text x="70" y="445" font-size="13" fill="#D4A843" font-weight="700" font-family="Inter, sans-serif">💡 Key Insight:</text>
    <text x="70" y="465" font-size="12" fill="#CBD5E1" font-family="Inter, sans-serif">AI data centers alone now consume 2-3x more silver per chip than traditional processors due to thermal management requirements.</text>
  </g>
</svg>