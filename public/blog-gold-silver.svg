<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F1729"/><stop offset="100%" stop-color="#0B0F1A"/>
    </linearGradient>
    <linearGradient id="gld2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECC94B"/><stop offset="100%" stop-color="#B8912E"/>
    </linearGradient>
    <linearGradient id="slv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2E8F0"/><stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <radialGradient id="gwL" cx="30%" cy="50%"><stop offset="0%" stop-color="#D4A843" stop-opacity="0.1"/><stop offset="60%" stop-color="#0B0F1A" stop-opacity="0"/></radialGradient>
    <radialGradient id="gwR" cx="70%" cy="50%"><stop offset="0%" stop-color="#94A3B8" stop-opacity="0.06"/><stop offset="60%" stop-color="#0B0F1A" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#gwL)"/>
  <rect width="1200" height="630" fill="url(#gwR)"/>

  <!-- Gold coin (left) -->
  <g transform="translate(320,280)">
    <circle r="170" fill="#111827" stroke="#D4A843" stroke-width="3"/>
    <circle r="150" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.2"/>
    <circle r="130" fill="#D4A843" opacity="0.06"/>
    <!-- Inner ring pattern -->
    <circle r="110" fill="none" stroke="#D4A843" stroke-width="0.5" opacity="0.15" stroke-dasharray="8 8"/>
    <!-- Au symbol -->
    <text y="-15" text-anchor="middle" fill="#D4A843" font-family="Georgia,serif" font-size="80" font-weight="700">Au</text>
    <text y="30" text-anchor="middle" fill="#D4A843" font-family="Arial,sans-serif" font-size="18" font-weight="600" opacity="0.7">GOLD</text>
    <!-- Small star accents -->
    <circle cx="-80" cy="-80" r="2" fill="#D4A843" opacity="0.4"/>
    <circle cx="85" cy="-75" r="1.5" fill="#D4A843" opacity="0.3"/>
    <circle cx="70" cy="90" r="2" fill="#D4A843" opacity="0.35"/>
  </g>

  <!-- Silver coin (right) -->
  <g transform="translate(880,280)">
    <circle r="170" fill="#111827" stroke="#94A3B8" stroke-width="3"/>
    <circle r="150" fill="none" stroke="#94A3B8" stroke-width="1" opacity="0.2"/>
    <circle r="130" fill="#94A3B8" opacity="0.04"/>
    <circle r="110" fill="none" stroke="#94A3B8" stroke-width="0.5" opacity="0.15" stroke-dasharray="8 8"/>
    <text y="-15" text-anchor="middle" fill="#94A3B8" font-family="Georgia,serif" font-size="80" font-weight="700">Ag</text>
    <text y="30" text-anchor="middle" fill="#94A3B8" font-family="Arial,sans-serif" font-size="18" font-weight="600" opacity="0.7">SILVER</text>
    <circle cx="-80" cy="-80" r="2" fill="#94A3B8" opacity="0.3"/>
    <circle cx="85" cy="-75" r="1.5" fill="#94A3B8" opacity="0.25"/>
    <circle cx="70" cy="90" r="2" fill="#94A3B8" opacity="0.3"/>
  </g>

  <!-- Ratio badge (center) -->
  <g transform="translate(600,280)">
    <!-- Connecting lines -->
    <line x1="-130" y1="0" x2="-40" y2="0" stroke="#D4A843" stroke-width="1.5" opacity="0.3"/>
    <line x1="40" y1="0" x2="130" y2="0" stroke="#94A3B8" stroke-width="1.5" opacity="0.3"/>
    <!-- Badge -->
    <rect x="-52" y="-32" width="104" height="64" rx="16" fill="#111827" stroke="#D4A843" stroke-width="2"/>
    <text y="8" text-anchor="middle" fill="#D4A843" font-family="Arial,sans-serif" font-size="30" font-weight="900">88:1</text>
  </g>

  <!-- Subtle scale/balance lines at top -->
  <g transform="translate(600,60)" opacity="0.15">
    <line x1="0" y1="0" x2="-200" y2="30" stroke="#D4A843" stroke-width="2"/>
    <line x1="0" y1="0" x2="200" y2="30" stroke="#94A3B8" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#F1F5F9" stroke-width="1.5"/>
    <circle cx="-200" cy="30" r="20" fill="none" stroke="#D4A843" stroke-width="1"/>
    <circle cx="200" cy="30" r="20" fill="none" stroke="#94A3B8" stroke-width="1"/>
  </g>

  <!-- Logo -->
  <rect x="548" y="560" width="32" height="32" rx="9" fill="url(#gld2)"/>
  <text x="557" y="583" fill="#0B0F1A" font-family="Arial,sans-serif" font-size="18" font-weight="900">H</text>
  <text x="590" y="583" fill="#F1F5F9" font-family="Arial,sans-serif" font-size="15" font-weight="800">HardAssets.io</text>
</svg>
