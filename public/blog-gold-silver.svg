<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0B0F1A"/>
  <defs>
    <linearGradient id="goldG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A843"/><stop offset="100%" stop-color="#B8912E"/>
    </linearGradient>
    <linearGradient id="silverG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C0C0C0"/><stop offset="100%" stop-color="#8A8A8A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="35%" cy="50%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.12"/><stop offset="100%" stop-color="#0B0F1A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="50%">
      <stop offset="0%" stop-color="#C0C0C0" stop-opacity="0.08"/><stop offset="100%" stop-color="#0B0F1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Gold coin -->
  <circle cx="340" cy="300" r="160" fill="#111827" stroke="#D4A843" stroke-width="3"/>
  <circle cx="340" cy="300" r="140" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.3"/>
  <circle cx="340" cy="300" r="120" fill="url(#goldG)" opacity="0.15"/>
  <text x="340" y="270" text-anchor="middle" fill="#D4A843" font-family="serif" font-size="72" font-weight="700">Au</text>
  <text x="340" y="320" text-anchor="middle" fill="#D4A843" font-family="monospace" font-size="20" font-weight="600" opacity="0.8">GOLD</text>
  <text x="340" y="350" text-anchor="middle" fill="#D4A843" font-family="monospace" font-size="14" opacity="0.5">79 · 196.97</text>
  <!-- Silver coin -->
  <circle cx="860" cy="300" r="160" fill="#111827" stroke="#94A3B8" stroke-width="3"/>
  <circle cx="860" cy="300" r="140" fill="none" stroke="#94A3B8" stroke-width="1" opacity="0.3"/>
  <circle cx="860" cy="300" r="120" fill="url(#silverG)" opacity="0.08"/>
  <text x="860" y="270" text-anchor="middle" fill="#94A3B8" font-family="serif" font-size="72" font-weight="700">Ag</text>
  <text x="860" y="320" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="20" font-weight="600" opacity="0.8">SILVER</text>
  <text x="860" y="350" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="14" opacity="0.5">47 · 107.87</text>
  <!-- Ratio divider -->
  <line x1="520" y1="200" x2="680" y2="200" stroke="#1E293B" stroke-width="2"/>
  <line x1="520" y1="400" x2="680" y2="400" stroke="#1E293B" stroke-width="2"/>
  <line x1="600" y1="200" x2="600" y2="400" stroke="#1E293B" stroke-width="2"/>
  <rect x="550" y="260" width="100" height="80" rx="12" fill="#111827" stroke="#D4A843" stroke-width="2"/>
  <text x="600" y="295" text-anchor="middle" fill="#D4A843" font-family="monospace" font-size="28" font-weight="800">88:1</text>
  <text x="600" y="322" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="11" font-weight="600">AU/AG RATIO</text>
  <!-- Arrows -->
  <line x1="500" y1="300" x2="550" y2="300" stroke="#D4A843" stroke-width="2" opacity="0.5"/>
  <line x1="650" y1="300" x2="700" y2="300" stroke="#94A3B8" stroke-width="2" opacity="0.5"/>
  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#F1F5F9" font-family="system-ui" font-size="32" font-weight="900" letter-spacing="-0.5">The Gold/Silver Ratio</text>
  <text x="600" y="115" text-anchor="middle" fill="#94A3B8" font-family="system-ui" font-size="16">What It Means & How Investors Use It</text>
  <!-- Price labels -->
  <text x="340" y="500" text-anchor="middle" fill="#D4A843" font-family="monospace" font-size="24" font-weight="700">$3,042/oz</text>
  <text x="860" y="500" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="24" font-weight="700">$34.18/oz</text>
  <!-- Brand -->
  <rect x="540" y="550" width="28" height="28" rx="8" fill="url(#goldG)"/>
  <text x="548" y="571" fill="#0B0F1A" font-family="system-ui" font-size="16" font-weight="900">H</text>
  <text x="578" y="571" fill="#94A3B8" font-family="system-ui" font-size="13" font-weight="600">HardAssets.io</text>
</svg>
